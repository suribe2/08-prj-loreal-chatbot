<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal Beauty Advisor</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="gold-bar"></div>

    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <!-- L'Oréal logo — replace loreal-logo.png with the actual filename from your Codespace -->
        <img
          src="./img/loreal-logo.png"
          alt="L'Oréal Paris"
          class="brand-logo"
        />
        <h1 class="site-title">Beauty Advisor</h1>
        <p class="brand-tagline">Because You're Worth It</p>
        <p class="header-intro">
          Ask me about skincare routines, makeup picks, haircare, or find your
          perfect product match.
        </p>
      </header>

      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <!-- Current question display — resets with each new question -->
          <div id="currentQuestion" class="current-question hidden">
            <span class="question-label">You asked:</span>
            <span id="questionText"></span>
          </div>

          <div id="chatWindow" class="chat-window">
            <!-- messages appended here via JS -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask about skincare, makeup, haircare…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>

          <div class="suggestion-chips">
            <button class="chip">Best moisturiser for dry skin?</button>
            <button class="chip">How do I layer serums?</button>
            <button class="chip">Recommend a red lipstick</button>
            <button class="chip">Hair care for colour-treated hair</button>
          </div>
        </section>
      </main>

      <!------- Footer ------->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal Paris. All rights reserved.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
